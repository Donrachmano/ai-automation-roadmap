<style>

.row-item{display:flex;gap:12px;margin-bottom:6px;padding:9px 12px;background:#0d1f2d;border:1px solid #1e3a4a;border-left:2px solid #ffeb3b;border-radius:4px;align-items:flex-start}

.check-item span:first-child{color:#ffeb3b;flex-shrink:0;margin-top:1px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

<script>
var cur=0,done=new Set();
var QUIZ={
  arrow:{q:"Mana penulisan arrow function yang benar untuk 1 parameter <code>price</code> yang mengembalikan <code>price * 1.11</code>?",opts:[
    {t:"const addTax = (price) => { price * 1.11 }",c:false,e:"Tidak ada kata kunci return — hasilnya selalu undefined"},
    {t:"const addTax = price => price * 1.11",c:true,e:"Betul! 1 parameter (tanpa kurung) + 1 ekspresi (tanpa curly braces dan return)"},
    {t:"const addTax = function(price) { return price * 1.11 }",c:false,e:"Valid tapi ini function expression biasa — bukan arrow function"},
    {t:"const addTax => price { return price * 1.11 }",c:false,e:"Syntax salah — tanda = harus ada setelah nama variable"}
  ]},
  map:{q:"Dari array <code>[100, 200, 300]</code>, perlu array setelah diskon 20%: <code>[80, 160, 240]</code>. Code yang tepat?",opts:[
    {t:"prices.filter(p => p * 0.8)",c:false,e:"filter() untuk seleksi true/false — bukan transformasi nilai"},
    {t:"prices.map(p => p * 0.8)",c:true,e:"Betul! map() mentransformasi setiap item dan mengembalikan array baru dengan panjang sama"},
    {t:"prices.forEach(p => p * 0.8)",c:false,e:"forEach() tidak mengembalikan array baru — hasilnya undefined"},
    {t:"prices.find(p => p * 0.8)",c:false,e:"find() hanya mengembalikan 1 item yang pertama cocok"}
  ]},
  filterfind:{q:"Array <code>users</code> berisi 100 user. Perlu mencari 1 user dengan <code>id === 42</code>. Method paling tepat?",opts:[
    {t:"users.map(u => u.id === 42)",c:false,e:"map() menghasilkan array boolean — bukan yang dicari"},
    {t:"users.filter(u => u.id === 42)",c:false,e:"Bisa, tapi mengembalikan array. Karena ID unik, find() lebih tepat"},
    {t:"users.find(u => u.id === 42)",c:true,e:"Betul! find() langsung mengembalikan item pertama yang cocok — sempurna untuk ID unik"},
    {t:"users.forEach(u => u.id === 42)",c:false,e:"forEach() tidak mengembalikan nilai apapun — selalu undefined"}
  ]},
  destruct:{q:"Dari <code>const obj = { name: 'Budi', score: 90, level: 'advanced' }</code>, ambil hanya <code>name</code> dan <code>level</code> dalam 1 baris:",opts:[
    {t:"const name = obj.name; const level = obj.level;",c:false,e:"Valid tapi ini 2 baris — bukan destructuring"},
    {t:"const { name, level } = obj;",c:true,e:"Betul! Object destructuring — ambil beberapa field dari object sekaligus dalam 1 baris"},
    {t:"const [name, level] = obj;",c:false,e:"Bracket [] adalah array destructuring — untuk object gunakan curly braces {}"},
    {t:"const name, level = obj;",c:false,e:"Syntax JavaScript tidak valid sama sekali"}
  ]},
  optional:{q:"<code>const data = { user: null }</code>. Apa hasil dari <code>data?.user?.email ?? 'no email'</code>?",opts:[
    {t:"TypeError: Cannot read properties of null",c:false,e:"Optional chaining ?. mencegah error ini — jika null, langsung return undefined"},
    {t:"'no email'",c:true,e:"Betul! data.user null → ?.email return undefined → ?? memberikan fallback 'no email'"},
    {t:"null",c:false,e:"null adalah nilai data.user, tapi setelah ?. hasilnya undefined dan ?? memberikan fallback string"},
    {t:"undefined",c:false,e:"Nilai antara sebelum ??. Karena ada nullish coalescing, hasil akhirnya adalah 'no email'"}
  ]}
};

var CODE={
'r-arrow':"// Arrow functions\nconst greet = name => \"Halo, \" + name + \"!\";\nconsole.log(greet(\"Budi\"));\n\n// Multi-param: butuh kurung\nconst formatPrice = (price, currency) => currency + \" \" + price.toLocaleString(\"id-ID\");\nconsole.log(formatPrice(1500000, \"Rp\"));\n\n// Return object: bungkus dengan ( )\nconst makeProduct = (name, price) => ({ name: name, price: price });\nconsole.log(JSON.stringify(makeProduct(\"Laptop\", 12000000)));",

'r-map':"const orders = [\n  { order_id: \"ORD-001\", customer: \"Budi\", total_idr: 500000, items: 3 },\n  { order_id: \"ORD-002\", customer: \"Sari\", total_idr: 1200000, items: 7 },\n  { order_id: \"ORD-003\", customer: \"Joko\", total_idr: 250000, items: 1 },\n];\n\n// Transform: rename field, konversi IDR ke USD, tambah summary\nconst report = orders.map(order => ({\n  id: order.order_id,\n  customer: order.customer,\n  totalUSD: (order.total_idr / 15800).toFixed(2),\n  summary: order.items + \" item(s)\",\n}));\n\nconsole.log(JSON.stringify(report, null, 2));",

'r-filter':"const products = [\n  { id: \"P01\", name: \"Laptop\", category: \"electronics\", price: 12000000, inStock: true },\n  { id: \"P02\", name: \"Mouse\", category: \"electronics\", price: 150000, inStock: false },\n  { id: \"P03\", name: \"Meja Kerja\", category: \"furniture\", price: 2500000, inStock: true },\n  { id: \"P04\", name: \"Kursi\", category: \"furniture\", price: 1800000, inStock: true },\n  { id: \"P05\", name: \"Monitor\", category: \"electronics\", price: 3500000, inStock: true },\n];\n\n// filter: electronics yang tersedia\nconst availElec = products.filter(p => p.category === \"electronics\" && p.inStock);\nconsole.log(\"Electronics in stock:\", availElec.map(p => p.name).join(\", \"));\n\n// filter: harga di bawah 2 juta\nconst affordable = products.filter(p => p.price < 2000000);\nconsole.log(\"Under 2M:\", affordable.map(p => p.name).join(\", \"));\n\n// find: 1 produk spesifik\nconst target = products.find(p => p.id === \"P03\");\nconsole.log(\"Found:\", target ? target.name : \"not found\");",

'r-foreach':"const invoices = [\n  { id: \"INV-001\", client: \"PT Maju\", amount: 5000000, status: \"unpaid\" },\n  { id: \"INV-002\", client: \"CV Berkah\", amount: 3200000, status: \"paid\" },\n  { id: \"INV-003\", client: \"UD Jaya\", amount: 1500000, status: \"unpaid\" },\n];\n\nconst unpaid = invoices.filter(inv => inv.status === \"unpaid\");\nconsole.log(\"=== TAGIHAN BELUM DIBAYAR ===\");\nunpaid.forEach(inv => {\n  const fmt = \"Rp \" + inv.amount.toLocaleString(\"id-ID\");\n  console.log(inv.id + \" | \" + inv.client + \" | \" + fmt);\n});\nconsole.log(\"Total: \" + unpaid.length + \" invoice\");",

'r-destruct':"const formData = {\n  full_name: \"Budi Santoso\",\n  email_address: \"budi@company.com\",\n  phone: \"081234567890\",\n  company: \"PT Maju Bersama\",\n  timestamp: \"2025-01-15T10:30:00Z\",\n};\n\n// Destructuring: ambil field + rename\nconst { full_name: name, email_address: email, company } = formData;\nconsole.log(\"Name:\", name, \"| Email:\", email);\n\n// Spread: buat object baru dengan tambah field\nconst crmPayload = {\n  ...formData,\n  fullName: name,\n  source: \"website\",\n  status: \"new_lead\",\n};\nconsole.log(JSON.stringify(crmPayload, null, 2));",

'r-optional':"const customers = [\n  { id: 1, profile: { fullName: \"Budi Santoso\" }, address: { city: \"Jakarta\" }, subscription: { plan: \"pro\" } },\n  { id: 2, profile: { fullName: \"Sari Dewi\" }, address: null, subscription: { plan: \"free\" } },\n  { id: 3, subscription: null },\n];\n\nconst formatted = customers.map(c => ({\n  id: c.id,\n  name: c?.profile?.fullName ?? \"Unknown\",\n  city: c?.address?.city ?? \"No address\",\n  plan: c?.subscription?.plan ?? \"free\",\n}));\n\nconsole.log(JSON.stringify(formatted, null, 2));",

'r-chain':"const salesData = [\n  { rep: \"Budi\", region: \"North\", deals: 12, revenue: 180000000 },\n  { rep: \"Sari\", region: \"South\", deals: 8,  revenue: 120000000 },\n  { rep: \"Joko\", region: \"North\", deals: 15, revenue: 225000000 },\n  { rep: \"Rina\", region: \"East\",  deals: 6,  revenue:  90000000 },\n  { rep: \"Dodi\", region: \"North\", deals: 20, revenue: 300000000 },\n  { rep: \"Maya\", region: \"South\", deals: 11, revenue: 165000000 },\n];\n\n// Pipeline: North → sort desc → top 2 → format\nconst topNorth = salesData\n  .filter(s => s.region === \"North\")\n  .sort((a, b) => b.revenue - a.revenue)\n  .slice(0, 2)\n  .map((s, i) => ({\n    rank: i + 1,\n    rep: s.rep,\n    revenue: \"Rp \" + (s.revenue / 1000000).toFixed(0) + \"M\",\n  }));\n\nconsole.log(\"Top 2 North:\", JSON.stringify(topNorth, null, 2));\nconst total = salesData.reduce((sum, s) => sum + s.revenue, 0);\nconsole.log(\"Grand total: Rp \" + (total / 1000000).toFixed(0) + \"M\");",

'm01':"const rawLeads = [\n  { first_name: \"Budi\", last_name: \"Santoso\", email: \"budi@co.com\", lead_score: 85, source: \"web\" },\n  { first_name: \"Sari\", last_name: \"Dewi\",    email: \"sari@co.com\", lead_score: 62, source: \"referral\" },\n  { first_name: \"Joko\", last_name: \"Purnomo\", email: \"joko@co.com\", lead_score: 45, source: \"ads\" },\n];\n\n// Output: { fullName, email, category, source }\n// category: hot(>=80) warm(>=50) cold(<50)\nconst formatted = rawLeads.map(lead => ({\n  fullName: lead.first_name + \" \" + lead.last_name,\n  email: lead.email,\n  category: lead.lead_score >= 80 ? \"hot\" : lead.lead_score >= 50 ? \"warm\" : \"cold\",\n  source: lead.source,\n}));\n\nconsole.log(JSON.stringify(formatted, null, 2));",

'm02':"const orders = [\n  { order_id: \"O1\", customer: \"Budi\", status: \"paid\",      total: 2500000 },\n  { order_id: \"O2\", customer: \"Sari\", status: \"pending\",   total: 1800000 },\n  { order_id: \"O3\", customer: \"Joko\", status: \"paid\",      total:  750000 },\n  { order_id: \"O4\", customer: \"Rina\", status: \"paid\",      total: 3200000 },\n  { order_id: \"O5\", customer: \"Dodi\", status: \"cancelled\", total:  950000 },\n  { order_id: \"O6\", customer: \"Maya\", status: \"paid\",      total:  420000 },\n];\n\n// filter paid + total > 1jt, then clean field names\nconst result = orders\n  .filter(o => o.status === \"paid\" && o.total > 1000000)\n  .map(o => ({ orderId: o.order_id, customer: o.customer, total: o.total }));\n\nconsole.log(JSON.stringify(result, null, 2));\nconsole.log(\"Count:\", result.length, \"orders\");",

'm03':"const webhooks = [\n  { event: \"lead_created\", data: { contact: { name: \"Budi\", email: \"b@c.com\" }, address: { city: \"Jakarta\" } } },\n  { event: \"lead_created\", data: { contact: { name: \"Sari\" } } },\n  { event: \"lead_created\", data: null },\n];\n\n// Safe parse dengan ?. dan ??\nconst parsed = webhooks.map(w => ({\n  event: w.event,\n  name:  w?.data?.contact?.name  ?? \"Unknown\",\n  email: w?.data?.contact?.email ?? \"no-reply@placeholder.com\",\n  city:  w?.data?.address?.city  ?? \"Unknown City\",\n}));\n\nconsole.log(JSON.stringify(parsed, null, 2));",

'm04':"const closedDeals = [\n  { deal_id: \"D01\", rep: \"Budi\", client: \"PT Alpha\", value: 12000000, product: \"Pro Plan\" },\n  { deal_id: \"D02\", rep: \"Sari\", client: \"CV Beta\",  value:  3500000, product: \"Starter\" },\n  { deal_id: \"D03\", rep: \"Joko\", client: \"UD Gamma\", value:  8500000, product: \"Enterprise\" },\n  { deal_id: \"D04\", rep: \"Rina\", client: \"PT Delta\", value:  2000000, product: \"Starter\" },\n];\n\n// filter >5M, gunakan destructuring di map()\nconst messages = closedDeals\n  .filter(({ value }) => value > 5000000)\n  .map(({ deal_id, rep, client, value, product }) => ({\n    id: deal_id,\n    slack: \"[DEAL CLOSED] \" + rep + \" won \" + client +\n           \" (\" + product + \") — Rp \" + (value / 1000000).toFixed(1) + \"M\",\n  }));\n\nmessages.forEach(m => console.log(m.id + \": \" + m.slack));",

'm05':"const rawCustomers = [\n  { id: 1, name: \"Budi S\", active: true,  joinDate: \"2024-03-15\", address: { city: \"Jakarta\" },  tier: \"gold\" },\n  { id: 2, name: \"Sari D\", active: false, joinDate: \"2024-01-10\", address: null,               tier: \"silver\" },\n  { id: 3, name: \"Joko P\", active: true,  joinDate: \"2023-11-20\", address: { city: \"Bandung\" }, tier: \"platinum\" },\n  { id: 4, name: \"Rina M\", active: true,  joinDate: \"2024-05-01\", address: { city: \"Surabaya\" },tier: \"gold\" },\n  { id: 5, name: \"Dodi K\", active: true,  joinDate: \"2024-02-28\", address: null,               tier: \"silver\" },\n];\n\n// filter active → safe parse → enrich → sort oldest first\nconst enriched = rawCustomers\n  .filter(c => c.active)\n  .map(c => ({\n    id: c.id,\n    name: c.name,\n    city: c?.address?.city ?? \"Unknown\",\n    tier: c.tier,\n    joinDate: c.joinDate,\n    segment: c.tier === \"platinum\" ? \"VIP\" : c.tier === \"gold\" ? \"Premium\" : \"Standard\",\n  }))\n  .sort((a, b) => new Date(a.joinDate) - new Date(b.joinDate));\n\nconsole.log(\"Active:\", enriched.length);\nconsole.log(JSON.stringify(enriched, null, 2));"
};

function renderQuiz(id){
  var q=QUIZ[id];
  var letters=["A","B","C","D"];
  var opts=q.opts.map(function(opt,i){
    return '<button class="opt-btn" id="qopt-'+id+'-'+i+'" onclick="checkQ(\''+id+'\','+i+')">'+
      '<span style="color:#ffeb3b;font-size:10px;flex-shrink:0;margin-top:1px">'+letters[i]+'.</span>'+
      '<code style="font-size:11px;line-height:1.5">'+opt.t+'</code></button>';
  }).join("");
  return '<div class="quiz-wrap">'+
    '<div class="sec-lbl">◈ MINI QUIZ</div>'+
    '<div class="quiz-q">'+q.q+'</div>'+
    '<div class="quiz-opts" id="qopts-'+id+'">'+opts+'</div>'+
    '<div class="quiz-fb" id="qfb-'+id+'"></div></div>';
}

function checkQ(id,idx){
  var q=QUIZ[id];
  var fb=document.getElementById("qfb-"+id);
  if(fb.classList.contains("show"))return;
  var opts=document.getElementById("qopts-"+id).querySelectorAll(".opt-btn");
  opts.forEach(function(b){b.disabled=true;});
  var isCorrect=q.opts[idx].c;
  document.getElementById("qopt-"+id+"-"+idx).classList.add(isCorrect?"correct":"wrong");
  if(!isCorrect){q.opts.forEach(function(o,i){if(o.c)document.getElementById("qopt-"+id+"-"+i).classList.add("correct");});}
  fb.className="quiz-fb show "+(isCorrect?"correct":"wrong");
  fb.textContent=(isCorrect?"✓ BENAR!  ":"✗ SALAH.  ")+q.opts[idx].e;
}

{title:"Arrow Functions",codes:{"r-arrow":CODE["r-arrow"]},html:function(){

    '</div>'+
    '<div class="box tip"><div class="box-lbl b">◈ SHORTHAND RULES</div><div class="box-body"><strong style="color:#00e5ff">1 parameter</strong> → boleh hilangkan tanda kurung<br><strong style="color:#00e5ff">1 ekspresi</strong> → hilangkan <code>{ }</code> dan kata <code>return</code></div></div>'+
    '<div class="code-blk"><div class="code-hdr"><span class="code-lang">JS · ARROW SHORTHAND</span><button class="copy-btn" onclick="copyBlock(this)">copy</button></div><pre>'+
      '<span class="cm">// Full arrow</span>\n<span class="kw">const</span> <span class="fn">double</span> = (<span class="var">n</span>) => { <span class="kw">return</span> <span class="var">n</span> * <span class="num">2</span>; };\n\n'+
      '<span class="cm">// Shorthand: 1 param, 1 ekspresi</span>\n<span class="kw">const</span> <span class="fn">double</span> = <span class="var">n</span> => <span class="var">n</span> * <span class="num">2</span>;\n\n'+

    '<div class="sec-lbl" style="margin-top:16px">◈ COBA SENDIRI</div>'+
    '<div class="runner"><div class="runner-hdr"><span class="runner-lbl">▶ INTERACTIVE RUNNER</span><button class="run-btn" onclick="runCode(\'r-arrow\')">▶ RUN</button></div>'+

{title:"Destructuring & Spread",codes:{"r-destruct":CODE["r-destruct"]},html:function(){
  return '<div class="sec-lbl">◈ TOPIK 5</div>'+
    '<div class="step-title">Destructuring &amp; Spread</div>'+
    '<div class="step-sub">Dua syntax paling elegan di JS modern. Destructuring untuk <strong style="color:#ffeb3b">mengambil nilai dari object</strong>, spread <code>...</code> untuk <strong style="color:#ffeb3b">menggabungkan atau menyalin</strong> data.</div>'+
    '<div class="sec-lbl">◈ OBJECT DESTRUCTURING</div>'+
    '<div class="code-blk"><div class="code-hdr"><span class="code-lang">JS · DESTRUCTURING</span><button class="copy-btn" onclick="copyBlock(this)">copy</button></div><pre>'+
      '<span class="kw">const</span> <span class="var">user</span> = { <span class="prop">id</span>: <span class="num">1</span>, <span class="prop">name</span>: <span class="str">"Budi"</span>, <span class="prop">email</span>: <span class="str">"budi@mail.com"</span>, <span class="prop">role</span>: <span class="str">"admin"</span> };\n\n'+
      '<span class="cm">// Cara lama: 1 baris per field</span>\n<span class="kw">const</span> <span class="var">name</span> = <span class="var">user</span>.<span class="prop">name</span>;\n\n'+
      '<span class="cm">// Destructuring: ambil beberapa sekaligus</span>\n<span class="kw">const</span> { <span class="var">name</span>, <span class="var">email</span>, <span class="var">role</span> } = <span class="var">user</span>;\n\n'+
      '<span class="cm">// Rename saat destructuring</span>\n<span class="kw">const</span> { <span class="var">name</span>: <span class="var">fullName</span>, <span class="var">role</span>: <span class="var">userRole</span> } = <span class="var">user</span>;\n\n'+
      '<span class="cm">// Default value jika field tidak ada</span>\n<span class="kw">const</span> { <span class="var">name</span>, <span class="var">avatar</span> = <span class="str">"default.png"</span> } = <span class="var">user</span>;\n\n'+
      '<span class="cm">// Di function parameter — sangat umum di n8n!</span>\n<span class="kw">const</span> <span class="fn">fmt</span> = ({ <span class="var">name</span>, <span class="var">email</span> }) => <span class="var">name</span> + <span class="str">" → "</span> + <span class="var">email</span>;\n<span class="fn">fmt</span>(<span class="var">user</span>); <span class="cm">// langsung pass object</span>'+
    '</pre></div>'+
    '<div class="sec-lbl">◈ SPREAD OPERATOR (...)</div>'+
    '<div class="code-blk"><div class="code-hdr"><span class="code-lang">JS · SPREAD (...)</span><button class="copy-btn" onclick="copyBlock(this)">copy</button></div><pre>'+
      '<span class="cm">// Gabung dua array</span>\n<span class="kw">const</span> <span class="var">all</span> = [...<span class="var">list1</span>, ...<span class="var">list2</span>];\n\n'+
      '<span class="cm">// Merge dua object (kanan override kiri)</span>\n<span class="kw">const</span> <span class="var">base</span>   = { <span class="prop">timeout</span>: <span class="num">5000</span>, <span class="prop">retries</span>: <span class="num">3</span> };\n<span class="kw">const</span> <span class="var">custom</span> = { <span class="prop">timeout</span>: <span class="num">10000</span>, <span class="prop">apiKey</span>: <span class="str">"abc"</span> };\n<span class="kw">const</span> <span class="var">config</span> = { ...<span class="var">base</span>, ...<span class="var">custom</span> };\n<span class="cm">// → { timeout: 10000, retries: 3, apiKey: "abc" }</span>\n\n'+
      '<span class="cm">// Pattern umum: salin object + tambah field baru</span>\n<span class="kw">const</span> <span class="var">enriched</span> = {\n  ...<span class="var">rawUser</span>,\n  <span class="prop">createdAt</span>: <span class="kw">new</span> <span class="fn">Date</span>().<span class="fn">toISOString</span>(),\n  <span class="prop">verified</span>: <span class="kw">false</span>,\n};'+
    '</pre></div>'+
    '<div class="sec-lbl" style="margin-top:14px">◈ COBA SENDIRI</div>'+
    '<div class="runner"><div class="runner-hdr"><span class="runner-lbl">▶ DESTRUCTURING &amp; SPREAD PRACTICE</span><button class="run-btn" onclick="runCode(\'r-destruct\')">▶ RUN</button></div>'+
    '<textarea class="code-ta" id="r-destruct" rows="18"></textarea>'+
    '<div class="out-lbl">// OUTPUT</div><div class="out-area" id="out-r-destruct">Klik ▶ RUN untuk menjalankan kode</div></div>'+
    renderQuiz("destruct");
}},

{title:"Optional Chaining (?.)",codes:{"r-optional":CODE["r-optional"]},html:function(){

{title:"Method Chaining",codes:{"r-chain":CODE["r-chain"]},html:function(){
  return '<div class="sec-lbl">◈ TOPIK 7 — ADVANCED PATTERN</div>'+
    '<div class="step-title">Method Chaining — Data Pipeline</div>'+
    '<div class="step-sub">Kekuatan sebenarnya ada di kemampuan <strong style="color:#ffeb3b">menggabungkan semua method dalam satu pipeline</strong>. Inilah cara developer menulis data transformation yang bersih dan readable.</div>'+
    '<div class="box ok"><div class="box-lbl g">◈ KONEKSI LANGSUNG KE N8N</div><div class="box-body">n8n workflow adalah pipeline visual: Node A → Node B → Node C. Method chaining adalah hal yang sama dalam kode: <code>.filter() → .map() → .sort() → .slice()</code>. Setiap method menerima output method sebelumnya.</div></div>'+
    '<div class="code-blk"><div class="code-hdr"><span class="code-lang">JS · METHOD CHAINING PIPELINE</span><button class="copy-btn" onclick="copyBlock(this)">copy</button></div><pre>'+
      '<span class="kw">const</span> <span class="var">rawData</span> = [\n  { <span class="prop">id</span>: <span class="num">1</span>, <span class="prop">name</span>: <span class="str">"Budi"</span>, <span class="prop">active</span>: <span class="kw">true</span>,  <span class="prop">region</span>: <span class="str">"Java"</span>, <span class="prop">revenue</span>: <span class="num">15000000</span> },\n  { <span class="prop">id</span>: <span class="num">2</span>, <span class="prop">name</span>: <span class="str">"Sari"</span>, <span class="prop">active</span>: <span class="kw">false</span>, <span class="prop">region</span>: <span class="str">"Bali"</span>, <span class="prop">revenue</span>:  <span class="num">8000000</span> },\n  { <span class="prop">id</span>: <span class="num">3</span>, <span class="prop">name</span>: <span class="str">"Joko"</span>, <span class="prop">active</span>: <span class="kw">true</span>,  <span class="prop">region</span>: <span class="str">"Java"</span>, <span class="prop">revenue</span>: <span class="num">22000000</span> },\n];\n\n'+
      '<span class="cm">// Pipeline: active Java → sort desc → top 2 → format</span>\n<span class="kw">const</span> <span class="var">topJava</span> = <span class="var">rawData</span>\n  .<span class="fn">filter</span>(<span class="var">c</span> => <span class="var">c</span>.<span class="prop">active</span> && <span class="var">c</span>.<span class="prop">region</span> === <span class="str">"Java"</span>)   <span class="cm">// seleksi</span>\n  .<span class="fn">sort</span>((<span class="var">a</span>, <span class="var">b</span>) => <span class="var">b</span>.<span class="prop">revenue</span> - <span class="var">a</span>.<span class="prop">revenue</span>)        <span class="cm">// urutkan</span>\n  .<span class="fn">slice</span>(<span class="num">0</span>, <span class="num">2</span>)                                    <span class="cm">// ambil top 2</span>\n  .<span class="fn">map</span>((<span class="var">c</span>, <span class="var">i</span>) => ({                               <span class="cm">// format output</span>\n    <span class="prop">rank</span>: <span class="var">i</span> + <span class="num">1</span>,\n    <span class="prop">name</span>: <span class="var">c</span>.<span class="prop">name</span>,\n    <span class="prop">revenue</span>: <span class="str">"Rp "</span> + (<span class="var">c</span>.<span class="prop">revenue</span> / <span class="num">1000000</span>).<span class="fn">toFixed</span>(<span class="num">1</span>) + <span class="str">"M"</span>,\n  }));'+
    '</pre></div>'+
    '<div class="box tip"><div class="box-lbl b">◈ READABILITY TIP</div><div class="box-body">Tulis setiap method di baris baru dengan indentasi. Ini membuat pipeline mudah dibaca dan di-debug — setiap baris = satu transformasi yang jelas tujuannya.</div></div>'+
    '<div class="sec-lbl" style="margin-top:14px">◈ COBA SENDIRI — FULL PIPELINE</div>'+
    '<div class="runner"><div class="runner-hdr"><span class="runner-lbl">▶ METHOD CHAINING PRACTICE</span><button class="run-btn" onclick="runCode(\'r-chain\')">▶ RUN</button></div>'+
    '<textarea class="code-ta" id="r-chain" rows="22"></textarea>'+
    '<div class="out-lbl">// OUTPUT</div><div class="out-area" id="out-r-chain">Klik ▶ RUN untuk menjalankan kode</div></div>';
}},

function runCode(id){
  var ta=document.getElementById(id),out=document.getElementById("out-"+id);
  if(!ta||!out)return;
  var logs=[],origLog=console.log;
  console.log=function(){
    logs.push(Array.from(arguments).map(function(a){return typeof a==="object"?JSON.stringify(a,null,2):String(a);}).join(" "));
    origLog.apply(console,arguments);
  };
  try{
    new Function(ta.value)();
    out.className="out-area";
    out.textContent=logs.length?logs.join("\n"):"(no output)";
  }catch(e){
    out.className="out-area err";
    out.textContent="Error: "+e.message;
  }finally{console.log=origLog;}
}

function copyBlock(btn){
  var pre=btn.closest(".code-blk").querySelector("pre");
  if(!pre)return;
  navigator.clipboard.writeText(pre.textContent).then(function(){
    btn.textContent="copied!";
    setTimeout(function(){btn.textContent="copy";},1600);
  });
}

function validateM(num){
  var id="m"+num;
  var ta=document.getElementById(id);
  var res=document.getElementById("mres-"+num);
  if(!ta||!res)return;
  var code=ta.value;
  function pass(msg){res.className="m-result show pass";res.textContent="✓ MISSION PASSED — "+msg;}
  function fail(msg){res.className="m-result show fail";res.textContent="✗ NOT YET — "+msg;}
  try{
    if(num==="01"){
      var out=new Function(code+"\nreturn typeof formatted!=='undefined'?formatted:null;")();
      if(!Array.isArray(out)||out.length!==3)return fail("formatted harus array 3 item. Cek map() pada rawLeads.");
      if(out[0].fullName!=="Budi Santoso")return fail("fullName harus first_name + ' ' + last_name");
      if(out[0].category!=="hot"||out[1].category!=="warm"||out[2].category!=="cold")return fail("category: hot(>=80), warm(>=50), cold(<50)");
      if(!out[0].email||!out[0].source)return fail("Field email dan source harus ada");
      pass("fullName, email, category, source semua benar! Arrow + map + ternary ✓");
    }else if(num==="02"){
      var out=new Function(code+"\nreturn typeof result!=='undefined'?result:null;")();
      if(!Array.isArray(out)||out.length!==2)return fail("Harusnya 2 orders (paid + >1M). Got: "+(out?out.length:"null"));
      if(!out.every(function(o){return o.orderId&&o.customer&&o.total>1000000;}))return fail("Field harus bernama orderId (bukan order_id), customer, total");
      pass("2 orders lolos filter (paid + >1M), field clean. filter() + map() ✓");
    }else if(num==="03"){
      var out=new Function(code+"\nreturn typeof parsed!=='undefined'?parsed:null;")();
      if(!Array.isArray(out)||out.length!==3)return fail("parsed harus array 3 item");
      if(!out[0].name||out[0].name!=="Budi")return fail("Webhook pertama harusnya name: Budi");
      if(out[1].city===undefined||out[1].city===null)return fail("Webhook kedua city harusnya pakai fallback dari ??");
      if(out[2].name===undefined||out[2].name===null)return fail("Webhook ketiga (data null) harusnya semua field pakai ?? fallback");
      pass("Semua 3 webhook ter-parse tanpa crash. Optional chaining + ?? ✓");
    }else if(num==="04"){
      var out=new Function(code+"\nreturn typeof messages!=='undefined'?messages:null;")();
      if(!Array.isArray(out)||out.length!==2)return fail("Harusnya 2 deals >5M (D01 dan D03). Got: "+(out?out.length:"null"));
      if(!out.every(function(m){return m.id&&m.slack&&m.slack.length>10;}))return fail("Setiap item harus punya id dan slack string");
      pass("2 big deals ter-filter, destructuring di map() bekerja, Slack messages terbentuk ✓");
    }else if(num==="05"){
      var out=new Function(code+"\nreturn typeof enriched!=='undefined'?enriched:null;")();
      if(!Array.isArray(out)||out.length!==4)return fail("Harusnya 4 active customers (Sari skip). Got: "+(out?out.length:"null"));
      if(out[0].id!==3)return fail("Sort salah — joinDate ascending, Joko (2023-11-20) harus index [0]");
      if(!out.every(function(c){return c.segment;}))return fail("Setiap customer harus punya field segment");
      var hasPlatVip=out.some(function(c){return c.tier==="platinum"&&c.segment==="VIP";});
      if(!hasPlatVip)return fail("tier platinum → segment harus VIP");
      pass("4 active, sorted oldest first (Joko dulu), enriched dengan segment. Full pipeline ✓");
    }
  }catch(e){fail("Error: "+e.message);}
}

function nav(dir){
  var next=cur+dir;
  if(next<0||next>=STEPS.length)return;
  done.add(cur);cur=next;render();
}
function jumpTo(idx){
  if(idx===cur)return;
  done.add(cur);cur=idx;render();
}
function render(){
  var step=STEPS[cur];
  document.getElementById("content").innerHTML='<div class="fade-in">'+step.html()+'</div>';
  if(step.codes){
    Object.keys(step.codes).forEach(function(id){
      var ta=document.getElementById(id);
      if(ta)ta.value=step.codes[id];
    });
  }
  var dotsEl=document.getElementById("stepDots");
  dotsEl.innerHTML=STEPS.map(function(_,i){
    var cls="dot"+(i===cur?" active":done.has(i)?" done":"");
    return '<div class="'+cls+'" onclick="jumpTo('+i+')" title="'+STEPS[i].title+'"></div>';
  }).join("");
  document.getElementById("stepCtr").textContent=(cur+1)+" / "+STEPS.length;
  document.getElementById("progFill").style.width=((cur+1)/STEPS.length*100)+"%";
  document.getElementById("btnPrev").disabled=cur===0;
  var btnNext=document.getElementById("btnNext");
  btnNext.disabled=cur===STEPS.length-1;
  btnNext.textContent=cur===STEPS.length-2?"SELESAI →":"BERIKUTNYA →";
  window.scrollTo(0,0);
}
render();
</script>
</body>
</html>
