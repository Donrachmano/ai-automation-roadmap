<script>
var NAV=[
  {id:'s0',num:'WH-01',label:'REST API vs Webhook',tag:'perbedaan'},
  {id:'s1',num:'WH-02',label:'Trigger-based vs Polling',tag:'arsitektur'},
  {id:'s2',num:'WH-03',label:'Testing Webhook.site',tag:'testing'},

];

var QZ=[
  [{q:'Perbedaan utama antara REST API dan Webhook adalah...',opts:['Webhook lebih cepat dari REST API','REST API: client bertanya ke server; Webhook: server memberi tahu client','REST API hanya support JSON, Webhook support XML','Webhook tidak memerlukan internet'],c:1,fb:'Tepat! REST API bersifat request-response (client aktif bertanya). Webhook bersifat event-driven (server aktif memberi tahu). Ini perbedaan arsitektur yang fundamental.'},
   {q:'Kapan kamu HARUS menggunakan Webhook dibanding REST API polling?',opts:['Saat server API lambat','Saat kamu butuh notifikasi real-time saat event terjadi di provider','Saat data berubah setiap jam secara terprediksi','Saat API tidak support JSON'],c:1,fb:'Benar! Webhook ideal saat kamu butuh notifikasi segera saat event terjadi - seperti pembayaran berhasil, email diterima, atau order dibuat. Menunggu dengan polling tidak efisien.'}],
  [{q:'Apa yang dimaksud "trigger-based" pada webhook?',opts:['Webhook diaktifkan oleh tombol di dashboard','Webhook dikirim secara otomatis saat event spesifik terjadi di provider','Webhook harus di-trigger manual setiap hari','Trigger adalah format data JSON yang dipakai webhook'],c:1,fb:'Benar! Trigger-based berarti webhook dikirim otomatis HANYA saat event tertentu terjadi - bukan jadwal berkala. Event inilah yang men-trigger pengiriman POST request ke endpoint kamu.'},
   {q:'Jika server kamu tidak membalas webhook dengan HTTP 200 dalam waktu cepat, apa yang terjadi?',opts:['Webhook hilang selamanya','Provider anggap berhasil karena sudah dikirim','Provider retry mengirim webhook beberapa kali','Server provider mati'],c:2,fb:'Tepat! Provider akan retry. Ini penting - server kamu harus segera balas 200 OK, lalu proses payload di background. Jika terlambat atau gagal, provider retry dengan exponential backoff.'}],
  [{q:'webhook.site berguna untuk...',opts:['Deploy webhook server ke production','Inspect dan debug payload yang masuk tanpa butuh server','Enkripsi payload webhook','Membuat URL API baru'],c:1,fb:'Tepat! webhook.site generate URL unik yang langsung terima dan tampilkan semua webhook - headers, body, method. Sangat berguna saat kamu ingin lihat format payload dari Stripe, GitHub, dsb tanpa setup server.'},

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/\x3e/g,'&gt;').replace(/"/g,'&quot;');
}

function hlJson(json){
  if(typeof json!=='string')json=JSON.stringify(json,null,2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(m){
    if(/^"/.test(m)){if(/:$/.test(m))return'<span class="ky">'+esc(m)+'</span>';return'<span class="ks">'+esc(m)+'</span>';}
    if(/true|false|null/.test(m))return'<span class="kw">'+m+'</span>';
    return'<span class="kn">'+m+'</span>';
  });
}

function updateNav(){
  var nav=document.getElementById('navRow');if(!nav)return;
  nav.innerHTML=NAV.map(function(n,i){

    return '<button class="'+cls+'" onclick="goStep('+i+')"><span class="nid">'+n.num+'</span>'+n.label+'<span class="ntag">'+n.tag+'</span></button>';
  }).join('');
  var pct=Math.round((step+1)/NAV.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLbl').textContent=(step+1)+' / '+NAV.length;
}

function goStep(i){
  if(pollTmr){clearInterval(pollTmr);pollTmr=null;}

}

  h+='<h3>&#127918; Rate Limit Simulator</h3>';
  h+='<div class="rl-box">';
  h+='<div class="rl-meter"><div style="font-size:11px;color:var(--mt);white-space:nowrap">Quota:</div><div class="rl-bw"><div class="rl-bar" id="rlBar" style="width:100%"></div></div><div class="rl-cnt" id="rlCnt">'+rlRem+' / '+RL_LIMIT+'</div></div>';

function buildPMJson(d){
  return {
    info:{name:d.name||'My Collection',description:d.desc||'',schema:'https://schema.getpostman.com/json/collection/v2.1.0/collection.json'},
    item:[
      {name:d.r1n||'Request 1',request:{method:d.r1m||'GET',url:{raw:d.r1u||''},description:d.r1d||''}},
      {name:d.r2n||'Request 2',request:{method:d.r2m||'GET',url:{raw:d.r2u||''},description:d.r2d||''}},
      {name:d.r3n||'Request 3',request:{method:d.r3m||'POST',url:{raw:d.r3u||''},description:d.r3d||''}}
    ]
  };
}

function updatePM(){
  var d={};
  ['r1','r2','r3'].forEach(function(r){
    var nm=document.getElementById('pm'+r+'n');var mm=document.getElementById('pm'+r+'m');
    var um=document.getElementById('pm'+r+'u');var dm=document.getElementById('pm'+r+'d');
    if(nm)d[r+'n']=nm.value;if(mm)d[r+'m']=mm.value;
    if(um)d[r+'u']=um.value;if(dm)d[r+'d']=dm.value;
  });
  var nn=document.getElementById('pmName');var nd=document.getElementById('pmDesc');
  if(nn)d.name=nn.value;if(nd)d.desc=nd.value;
  window._pmData=d;
  var prev=document.getElementById('pmPreview');
  if(prev)prev.innerHTML=hlJson(buildPMJson(d));
}

function copyPM(){
  var d=window._pmData||PM_DEFAULTS;
  var json=JSON.stringify(buildPMJson(d),null,2);
  if(navigator.clipboard){navigator.clipboard.writeText(json);}
  var msg=document.getElementById('pmMsg');
  if(msg){msg.textContent='Collection JSON tersalin! Buka Postman > Import > Raw text > Paste';setTimeout(function(){msg.textContent='';},4000);}
}

function copyYaml(){
  var el=document.getElementById('yamlEditor');
  var txt=el?el.value:(window._yamlVal||YAML_TEMPLATE);
  if(navigator.clipboard){navigator.clipboard.writeText(txt);}
  var msg=document.getElementById('yamlMsg');
  if(msg){msg.textContent='YAML tersalin! Buka editor.swagger.io > paste di panel kiri';setTimeout(function(){msg.textContent='';},4000);}
}

  h+='<div class="nvbtns" style="max-width:880px;margin:0 auto;padding:0 24px"><button class="btnp" onclick="goStep(6)">&#8592; Postman Collections</button></div>';
  return h;
}

function saveProjField(){
  if(!window._proj)window._proj={};
  var k='p'+projTab;var d={};
  var pDesc=document.getElementById('pDesc');var pBase=document.getElementById('pBase');var pAuth=document.getElementById('pAuth');
  if(pDesc)d.desc=pDesc.value;if(pBase)d.base=pBase.value;if(pAuth)d.auth=pAuth.value;
  [1,2].forEach(function(ep){
    var m=document.getElementById('pM'+ep);var pa=document.getElementById('pPath'+ep);
    var ed=document.getElementById('pEpDesc'+ep);var pm=document.getElementById('pParam'+ep);var pr=document.getElementById('pResp'+ep);
    d['ep'+ep]={method:m?m.value:'GET',path:pa?pa.value:'',desc:ed?ed.value:'',param:pm?pm.value:'',resp:pr?pr.value:''};
  });
  window._proj[k]=d;
}

function checkProj(){
  saveProjField();
  var k='p'+projTab;var d=(window._proj||{})[k]||{};
  var msg=document.getElementById('projMsg');
  var errors=[];
  if(!d.desc||d.desc.trim().length<10)errors.push('Deskripsi API kurang lengkap (min 10 karakter)');
  if(!d.base||!d.base.startsWith('http'))errors.push('Base URL harus dimulai dengan http://  atau  https://');
  if(!d.auth||d.auth.trim().length<3)errors.push('Metode autentikasi harus diisi');
  var ep1=d.ep1||{};var ep2=d.ep2||{};
  if(!ep1.path||ep1.path.trim().length<2)errors.push('Path Endpoint 1 belum diisi');
  if(!ep1.desc||ep1.desc.trim().length<5)errors.push('Deskripsi Endpoint 1 kurang lengkap');
  if(!ep2.path||ep2.path.trim().length<2)errors.push('Path Endpoint 2 belum diisi');
  if(!ep2.desc||ep2.desc.trim().length<5)errors.push('Deskripsi Endpoint 2 kurang lengkap');
  if(errors.length>0){
    if(msg)msg.innerHTML='<div style="color:var(--rd)">Lengkapi dulu:<br>- '+errors.join('<br>- ')+'</div>';
    return;
  }
  projDone[projTab]=true;
  if(msg)msg.innerHTML='<div style="color:var(--gn)">&#10003; Dokumentasi API '+(projTab+1)+' disimpan!</div>';
  setTimeout(render,800);
}

function nextProj(){checkProj();if(projDone[projTab]){projTab=Math.min(2,projTab+1);render();}}

// -- Rate Limit Simulator -----------------------------------------------------
function rlSend(){
  var log=document.getElementById('rlLog'),bar=document.getElementById('rlBar'),cnt=document.getElementById('rlCnt'),btn=document.getElementById('rlBtn');
  if(!log)return;
  if(rlRem<=0){addRlLog(log,'rle-er','HTTP 429 Too Many Requests - Rate limited!');startRlCD();return;}
  rlRem--;
  var pct=rlRem/RL_LIMIT*100;
  if(bar){bar.style.width=pct+'%';bar.style.background=pct<=30?'var(--rd)':pct<=60?'var(--yw)':'var(--gn)';}
  if(cnt){cnt.textContent=rlRem+' / '+RL_LIMIT;cnt.style.color=pct<=30?'var(--rd)':pct<=60?'var(--yw)':'';}
  addRlLog(log,pct<=30?'rle-wn':'rle-ok','200 OK - Remaining: '+rlRem+'/'+RL_LIMIT+(rlRem<=3?' - Quota menipis!':''));
}
function addRlLog(log,cls,msg){var e=document.createElement('div');e.className='rle '+cls;e.textContent=msg;log.appendChild(e);log.scrollTop=log.scrollHeight;}
function startRlCD(){
  var btn=document.getElementById('rlBtn');if(!btn)return;
  btn.disabled=true;var secs=10;
  if(rlTmr)clearInterval(rlTmr);
  rlTmr=setInterval(function(){
    secs--;
    if(secs<=0){
      clearInterval(rlTmr);rlTmr=null;rlRem=RL_LIMIT;
      var b=document.getElementById('rlBar'),c=document.getElementById('rlCnt'),bb=document.getElementById('rlBtn'),lg=document.getElementById('rlLog');
      if(b){b.style.width='100%';b.style.background='var(--gn)';}
      if(c){c.textContent=RL_LIMIT+' / '+RL_LIMIT;c.style.color='';}
      if(bb){bb.disabled=false;bb.textContent='&#9654; Send Request';}
      if(lg)addRlLog(lg,'rle-ok','Window reset! Quota kembali penuh.');
    }else{if(btn)btn.textContent='Rate Limited - Reset in '+secs+'s';}
  },1000);
}
function rlReset(){
  if(rlTmr){clearInterval(rlTmr);rlTmr=null;}
  rlRem=RL_LIMIT;
  var b=document.getElementById('rlBar'),c=document.getElementById('rlCnt'),btn=document.getElementById('rlBtn'),log=document.getElementById('rlLog');
  if(b){b.style.width='100%';b.style.background='var(--gn)';}
  if(c){c.textContent=RL_LIMIT+' / '+RL_LIMIT;c.style.color='';}
  if(btn){btn.disabled=false;btn.textContent='&#9654; Send Request';}
  if(log)log.innerHTML='<div class="rle" style="color:var(--mt);font-style:italic">Quota direset. Mulai lagi!</div>';
}

document.getElementById('aiFab').onclick=function(){aiOpen=!aiOpen;document.getElementById('aiPanel').className='ai-pan'+(aiOpen?' open':'');};

function renderAiHist(){
  var h=document.getElementById('aiHist');if(!h)return;
  h.innerHTML=aiHist.map(function(m){return'<div class="ai-msg '+m.r+'">'+esc(m.c)+'</div>';}).join('');
  if(aiLoad)h.innerHTML+='<div class="ai-msg bot loading">Thinking...</div>';
  h.scrollTop=h.scrollHeight;
}

async function sendAI(){
  var inp=document.getElementById('aiInp');if(!inp)return;
  var msg=inp.value.trim();if(!msg||aiLoad)return;
  inp.value='';aiHist.push({r:'user',c:msg});aiLoad=true;
  document.getElementById('aiSnd').disabled=true;renderAiHist();
  var messages=aiHist.slice(-8).map(function(m){return{role:m.r==='user'?'user':'assistant',content:m.c};});
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'Kamu adalah AI Tutor untuk F-01 Sesi 3: Webhook & Advanced API. Topik yang dicover: perbedaan REST API vs Webhook, trigger-based vs polling, testing dengan webhook.site dan ngrok, rate limiting dan error handling, dan dokumentasi API (Swagger/OpenAPI dan Postman Collections). Semua ini untuk persiapan belajar n8n. Jawab dalam Bahasa Indonesia, ringkas, praktis, dan dengan contoh konkret. Maksimal 3 paragraf pendek.',messages:messages})});
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:'Maaf, tidak dapat merespons.';
    aiHist.push({r:'bot',c:reply});
  }catch(e){aiHist.push({r:'bot',c:'Error: '+e.message});}
  aiLoad=false;document.getElementById('aiSnd').disabled=false;renderAiHist();
}

render();
