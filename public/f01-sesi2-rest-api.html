<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST API Fundamentals — AI Automation Bootcamp · Sesi 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#080c10; --bg2:#0d1117; --bg3:#161b22; --bg4:#21262d;
    --border:#30363d; --cyan:#00e5ff; --cyan2:#00b8d4;
    --green:#3fb950; --red:#f85149; --yellow:#e3b341;
    --purple:#bc8cff; --orange:#ffa657; --text:#e6edf3; --muted:#8b949e;
    --mono:'JetBrains Mono',monospace; --sans:'Space Grotesk',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  header{position:sticky;top:0;z-index:100;background:rgba(8,12,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;}
  .logo{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:.08em;display:flex;align-items:center;gap:10px;}
  .logo-badge{background:var(--cyan);color:var(--bg);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.1em;}
  .logo-sep{color:var(--border);}
  .progress-wrap{display:flex;align-items:center;gap:10px;}
  .progress-bar{width:120px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .4s ease;}
  .progress-label{font-size:10px;color:var(--muted);}
  nav{display:flex;overflow-x:auto;gap:2px;padding:12px 24px 0;position:relative;z-index:1;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  .nav-btn{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--muted);padding:8px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .2s;display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
  .nav-btn .nb-id{color:var(--border);font-size:9px;}
  .nav-btn .nb-tag{font-size:9px;color:var(--bg4);background:var(--border);padding:1px 5px;border-radius:2px;}
  .nav-btn.done{color:var(--green);}
  .nav-btn.done .nb-id{color:var(--green);opacity:.6;}
  .nav-btn.done .nb-tag{background:rgba(63,185,80,.15);color:var(--green);}
  .nav-btn.active{color:var(--cyan);background:var(--bg2);border-color:var(--border);}
  .nav-btn.active .nb-id{color:var(--cyan);opacity:.7;}
  .nav-btn.active .nb-tag{background:rgba(0,229,255,.1);color:var(--cyan);}
  main{max-width:880px;margin:0 auto;padding:28px 24px 120px;position:relative;z-index:1;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 32px;margin-bottom:20px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .step-tag{font-size:10px;letter-spacing:.15em;color:var(--cyan);font-weight:600;margin-bottom:6px;}
  .step-title{font-family:var(--sans);font-size:22px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.3;}
  .step-title span{color:var(--cyan);}
  p{color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:12px;}
  p strong{color:var(--text);font-weight:600;}
  p code{color:var(--cyan);background:rgba(0,229,255,.08);padding:1px 6px;border-radius:3px;font-size:13px;}
  .diagram{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;margin:16px 0;font-size:13px;line-height:1.9;}
  .flow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:12px 0;}
  .flow-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:12px;color:var(--text);text-align:center;}
  .flow-box.cyan{border-color:var(--cyan);color:var(--cyan);}
  .flow-box.green{border-color:var(--green);color:var(--green);}
  .flow-arr{color:var(--muted);font-size:18px;}
  .code-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;font-size:12.5px;line-height:1.7;overflow-x:auto;margin:14px 0;position:relative;}
  .code-block .cb-header{font-size:10px;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .cb-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .cb-dot.r{background:var(--red);} .cb-dot.y{background:var(--yellow);} .cb-dot.g{background:var(--green);}
  .hl-key{color:var(--cyan);} .hl-str{color:var(--green);} .hl-num{color:var(--orange);}
  .hl-punc{color:var(--muted);} .hl-kw{color:var(--purple);} .hl-url{color:var(--yellow);}
  .hl-comment{color:var(--muted);font-style:italic;}
  .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
  .method-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px;}
  .method-card:hover{border-color:var(--muted);}
  .method-card.active{border-color:var(--cyan);background:rgba(0,229,255,.05);}
  .method-card .mc-verb{font-size:15px;font-weight:700;letter-spacing:.1em;}
  .mc-verb.get{color:var(--green);} .mc-verb.post{color:var(--cyan);} .mc-verb.put{color:var(--yellow);} .mc-verb.delete{color:var(--red);}
  .method-card .mc-crud{font-size:11px;color:var(--muted);}
  .method-card .mc-desc{font-size:12px;color:var(--text);line-height:1.5;}
  .method-detail{background:var(--bg);border:1px solid var(--cyan);border-radius:8px;padding:18px 20px;margin-top:14px;font-size:13px;animation:fadeIn .2s ease;}
  .method-detail .md-title{color:var(--cyan);font-size:11px;letter-spacing:.1em;margin-bottom:10px;}
  .method-detail .md-row{display:flex;gap:16px;margin-bottom:8px;}
  .method-detail .md-label{color:var(--muted);font-size:12px;width:90px;flex-shrink:0;}
  .method-detail .md-val{color:var(--text);font-size:12px;line-height:1.5;}
  .status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:16px 0;}
  .status-pill{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;}
  .status-code{font-size:14px;font-weight:700;min-width:36px;}
  .status-pill .sp-text{font-size:11px;color:var(--muted);line-height:1.4;}
  .status-pill .sp-name{color:var(--text);font-size:12px;}
  .s2{color:var(--green);} .s3{color:var(--cyan);} .s4{color:var(--yellow);} .s5{color:var(--red);}
  .tab-row{display:flex;gap:4px;margin-bottom:14px;}
  .tab-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 18px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;}
  .tab-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05);}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
  .info-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
  .info-box .ib-label{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;}
  .info-box .ib-val{font-size:13px;color:var(--text);line-height:1.5;}
  .info-box .ib-val code{color:var(--cyan);font-size:12px;}
  .url-anatomy{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin:14px 0;font-size:12px;overflow-x:auto;}
  .url-anatomy .ua-line{font-size:15px;margin-bottom:14px;line-height:2;}
  .ua-scheme{color:var(--purple);} .ua-host{color:var(--cyan);} .ua-path{color:var(--green);} .ua-query{color:var(--yellow);}
  .url-anatomy .ua-parts{display:flex;flex-wrap:wrap;gap:8px;}
  .ua-part{padding:4px 10px;border-radius:4px;font-size:11px;}
  .ua-part.scheme{background:rgba(188,140,255,.1);color:var(--purple);}
  .ua-part.host{background:rgba(0,229,255,.08);color:var(--cyan);}
  .ua-part.path{background:rgba(63,185,80,.1);color:var(--green);}
  .ua-part.query{background:rgba(227,179,65,.1);color:var(--yellow);}
  /* LIVE API */
  .api-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px;}
  .api-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .api-name{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);}
  .api-method-tag{font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:3px;background:rgba(63,185,80,.15);color:var(--green);}
  .api-url{font-size:11px;color:var(--yellow);word-break:break-all;margin-bottom:12px;}
  .try-btn{background:none;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--mono);font-size:12px;padding:7px 18px;border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
  .try-btn:hover{background:rgba(0,229,255,.08);}
  .try-btn:disabled{opacity:.5;cursor:not-allowed;}
  .api-result{margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:11.5px;max-height:200px;overflow-y:auto;line-height:1.7;display:none;}
  .api-result.show{display:block;animation:fadeIn .2s ease;}
  /* MISSIONS */
  .mission-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;}
  .mission-tab{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
  .mission-tab.active{border-color:var(--cyan);color:var(--cyan);}
  .mission-tab.done{border-color:var(--green);color:var(--green);}
  .mission-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px 24px;}
  .mission-title{font-family:var(--sans);font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:10px;}
  .mission-num{color:var(--cyan);font-size:12px;}
  .mission-desc{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7;}
  .api-input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .method-badge{font-size:11px;font-weight:700;letter-spacing:.08em;padding:8px 12px;border-radius:6px;background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3);flex-shrink:0;}
  .method-badge.post{background:rgba(0,229,255,.1);color:var(--cyan);border-color:rgba(0,229,255,.3);}
  .url-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--yellow);outline:none;transition:border-color .2s;}
  .url-input:focus{border-color:var(--cyan);}
  .body-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--green);outline:none;resize:vertical;min-height:80px;margin-bottom:10px;transition:border-color .2s;}
  .body-textarea:focus{border-color:var(--cyan);}
  .body-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .send-btn{background:var(--cyan);color:var(--bg);border:none;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:700;padding:9px 22px;cursor:pointer;transition:all .2s;letter-spacing:.05em;}
  .send-btn:hover{background:var(--cyan2);}
  .send-btn:disabled{opacity:.5;cursor:not-allowed;}
  .mission-result{margin-top:14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-size:12px;line-height:1.7;max-height:220px;overflow-y:auto;display:none;}
  .mission-result.show{display:block;animation:fadeIn .2s ease;}
  .mission-result.ok{border-color:var(--green);}
  .mission-result.err{border-color:var(--red);}
  .ok-banner{background:rgba(63,185,80,.1);border:1px solid var(--green);border-radius:6px;padding:12px 16px;font-size:13px;color:var(--green);margin-top:10px;display:flex;align-items:center;gap:10px;}
  .all-done-banner{background:linear-gradient(135deg,rgba(0,229,255,.05),rgba(63,185,80,.05));border:1px solid var(--cyan);border-radius:10px;padding:28px 24px;text-align:center;margin-top:16px;}
  .all-done-banner h2{font-family:var(--sans);font-size:20px;color:var(--cyan);margin-bottom:8px;}
  /* QUIZ */
  .quiz-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-top:20px;}
  .quiz-label{font-size:10px;color:var(--purple);letter-spacing:.15em;font-weight:600;margin-bottom:10px;}
  .quiz-q{font-size:14px;color:var(--text);margin-bottom:14px;line-height:1.6;}
  .quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .quiz-opt{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:13px;color:var(--text);cursor:pointer;transition:all .2s;text-align:left;}
  .quiz-opt:hover:not(:disabled){border-color:var(--muted);}
  .quiz-opt.correct{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.08);}
  .quiz-opt.wrong{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.08);}
  .quiz-feedback{font-size:12px;margin-top:8px;line-height:1.6;}
  .quiz-feedback.ok{color:var(--green);} .quiz-feedback.err{color:var(--red);}
  /* NAV BTNS */
  .nav-btns{display:flex;justify-content:space-between;margin-top:24px;gap:10px;}
  .btn-prev,.btn-next{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 22px;font-family:var(--mono);font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
  .btn-next{background:var(--bg2);border-color:var(--cyan);color:var(--cyan);margin-left:auto;}
  .btn-prev:hover{border-color:var(--muted);color:var(--text);}
  .btn-next:hover{background:rgba(0,229,255,.08);}
  /* POSTMAN MOCK */
  .pm-mock{background:#1c1c1c;border:1px solid #3d3d3d;border-radius:10px;overflow:hidden;margin:16px 0;font-size:12px;}
  .pm-titlebar{background:#2c2c2c;padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #3d3d3d;font-size:11px;color:#888;}
  .pm-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .pm-req-row{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid #3d3d3d;background:#252525;}
  .pm-msel{border-radius:4px;padding:6px 10px;font-size:12px;font-weight:700;letter-spacing:.05em;}
  .pm-msel.get{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.4);}
  .pm-msel.post{background:rgba(0,229,255,.12);color:#00e5ff;border:1px solid rgba(0,229,255,.3);}
  .pm-url-f{flex:1;background:#1a1a1a;border:1px solid #3d3d3d;border-radius:4px;padding:7px 12px;color:#e6edf3;font-family:var(--mono);font-size:12px;}
  .pm-send{background:#ff6b35;color:#fff;border:none;border-radius:4px;padding:7px 16px;font-weight:700;font-size:12px;cursor:pointer;}
  .pm-tabs-row{display:flex;background:#252525;border-bottom:1px solid #3d3d3d;}
  .pm-tab-item{padding:8px 14px;font-size:11px;color:#666;border-right:1px solid #3d3d3d;cursor:pointer;}
  .pm-tab-item.active{color:#ff6b35;border-bottom:2px solid #ff6b35;}
  .pm-tc{padding:14px;background:#1c1c1c;}
  .pm-kv{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .pm-kv .k{color:var(--cyan);min-width:160px;font-size:12px;}
  .pm-kv .v{color:var(--green);font-size:12px;}
  .pm-kv .hint{color:#666;font-size:11px;font-style:italic;}
  .pm-resp{border-top:1px solid #3d3d3d;padding:12px 14px;background:#1a1a1a;}
  .pm-resp-status{color:var(--green);font-size:11px;margin-bottom:8px;}
  /* TOOL CARDS */
  .tool-row{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap;}
  .tool-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px 18px;flex:1;min-width:200px;}
  .tool-card .tc-icon{font-size:28px;margin-bottom:8px;}
  .tool-card .tc-name{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .tool-card .tc-sub{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .tool-card .tc-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2);}
  .step-list{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
  .step-item{display:flex;gap:12px;align-items:flex-start;}
  .step-num{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:var(--cyan);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
  .step-text{font-size:13px;color:var(--text);line-height:1.6;}
  .step-text span{color:var(--muted);}
  /* AI TUTOR */
  .ai-fab{position:fixed;bottom:28px;right:28px;z-index:200;background:var(--cyan);color:var(--bg);border:none;border-radius:50px;padding:13px 22px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(0,229,255,.3);display:flex;align-items:center;gap:8px;transition:all .2s;letter-spacing:.04em;}
  .ai-fab:hover{background:var(--cyan2);box-shadow:0 4px 32px rgba(0,229,255,.5);}
  .ai-panel{position:fixed;bottom:90px;right:28px;z-index:200;width:360px;max-height:520px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;display:none;}
  .ai-panel.open{display:flex;animation:fadeIn .2s ease;}
  .ai-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
  .ai-title{font-size:12px;font-weight:600;color:var(--cyan);display:flex;align-items:center;gap:8px;}
  .ai-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
  .ai-close:hover{color:var(--text);}
  .ai-history{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
  .ai-msg{font-size:12.5px;line-height:1.7;padding:10px 14px;border-radius:8px;max-width:95%;}
  .ai-msg.user{background:rgba(0,229,255,.08);color:var(--cyan);align-self:flex-end;}
  .ai-msg.bot{background:var(--bg3);color:var(--text);align-self:flex-start;}
  .ai-msg.loading{color:var(--muted);font-style:italic;}
  .ai-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg);}
  .ai-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;}
  .ai-input:focus{border-color:var(--cyan);}
  .ai-send{background:var(--cyan);color:var(--bg);border:none;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:700;padding:9px 16px;cursor:pointer;}
  .ai-send:hover{background:var(--cyan2);}
  .ai-send:disabled{opacity:.5;cursor:not-allowed;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STEPS = ['intro','methods','request','response','auth','tools','realapi','practice'];

const NAV = [
  { id:'intro',    num:'01', label:'INTRO',    tag:'KONSEP DASAR' },
  { id:'methods',  num:'02', label:'METHODS',  tag:'VERB · CRUD' },
  { id:'request',  num:'03', label:'REQUEST',  tag:'URL · HEADERS · BODY' },
  { id:'response', num:'04', label:'RESPONSE', tag:'2xx · 4xx · 5xx' },

];

const QZ = {
  intro: {
    q:'REST API bekerja dengan prinsip Stateless. Apa artinya?',
    opts:['Server menyimpan semua data request sebelumnya','Setiap request berdiri sendiri, server tidak perlu ingat request lain','Hanya bisa dipakai sekali lalu mati','Tidak butuh koneksi internet'],
    ans:1,
    fb_ok:'✓ Stateless = setiap request mandiri. Server tidak menyimpan "memory" session. Ini yang bikin REST API bisa scale ke jutaan pengguna.',
    fb_err:'✗ Stateless = server tidak menyimpan state client. Setiap request harus membawa semua info yang dibutuhkan (termasuk auth token).'
  },
  methods: {
    q:'HTTP method apa yang digunakan untuk MEMBUAT data baru?',
    opts:['GET','PUT','POST','PATCH'],
    ans:2,
    fb_ok:'✓ POST = Create. Ingat CRUD: Create→POST, Read→GET, Update→PUT/PATCH, Delete→DELETE.',
    fb_err:'✗ POST untuk Create. GET=Read, PUT/PATCH=Update, DELETE=Delete.'
  },
  request: {
    q:'Di URL `https://api.example.com/posts?userId=2`, bagian `userId=2` disebut...',
    opts:['Path Parameter','URL Fragment','Query Parameter','Request Header'],
    ans:2,
    fb_ok:'✓ Query Parameter! Ditandai `?`, digunakan untuk filter/sort. Format: key=value, pisah `&` untuk banyak params.',

  },
  response: {

    opts:['Resource tidak ditemukan','Server error internal','Perlu autentikasi — token tidak valid','Rate limit terlampaui'],
    ans:2,
    fb_ok:'✓ 401 = Unauthorized (perlu auth). Beda dengan 403 = Forbidden (sudah auth tapi tidak punya akses).',

  },

    q:'Bearer Token dikirim ke server melalui...',
    opts:['Query parameter di URL','Request body (JSON)','Authorization header','Cookie khusus'],
    ans:2,

    fb_err:'✗ Gunakan tab "Authorization". Pilih "Bearer Token" dan Postman akan auto-generate headernya.'
  }
};

const METHOD_DATA = {
  GET:    { verb:'GET',    color:'get',    crud:'🔵 READ',        desc:'Mengambil data dari server.', safe:'Ya', idempotent:'Ya', body:'Tidak ada', example:'GET /api/users\nGET /api/users/123', returns:'200 OK' },
  POST:   { verb:'POST',   color:'post',   crud:'🟢 CREATE',      desc:'Membuat resource baru.',      safe:'Tidak', idempotent:'Tidak', body:'Wajib JSON body', example:'POST /api/users\nBody: {"name":"Andi"}', returns:'201 Created' },
  PUT:    { verb:'PUT',    color:'put',    crud:'🟡 UPDATE (full)',desc:'Mengganti seluruh resource.', safe:'Tidak', idempotent:'Ya', body:'Wajib (data lengkap)', example:'PUT /api/users/1\nBody: {"name":"Budi","email":"b@b.com"}', returns:'200 OK' },
  DELETE: { verb:'DELETE', color:'delete', crud:'🔴 DELETE',       desc:'Menghapus resource.',         safe:'Tidak', idempotent:'Ya', body:'Biasanya tidak ada', example:'DELETE /api/users/123', returns:'200 OK / 204 No Content' },
};

const LIVE_APIS = [
  { name:'JSONPlaceholder — User Detail',      url:'https://jsonplaceholder.typicode.com/users/1',                                                                  desc:'GET user id=1. API dummy paling populer untuk belajar REST. No auth.' },
  { name:'Open-Meteo — Cuaca Jakarta',         url:'https://api.open-meteo.com/v1/forecast?latitude=-6.2&longitude=106.8&current=temperature_2m,weathercode',      desc:'GET suhu & weathercode realtime Jakarta. Gratis, no auth.' },
  { name:'REST Countries — Indonesia',         url:'https://restcountries.com/v3.1/name/indonesia?fields=name,capital,population,currencies',                       desc:'GET info negara Indonesia: ibu kota, populasi, mata uang.' },
  { name:'Frankfurter — Kurs Mata Uang',       url:'https://api.frankfurter.app/latest?from=USD',                                                                   desc:'GET kurs USD ke semua mata uang (data ECB). Gratis, no auth, CORS-enabled.' },
  { name:'HackerNews Algolia — Top AI News',   url:'https://hn.algolia.com/api/v1/search?query=artificial+intelligence&hitsPerPage=3',                             desc:'GET 3 berita tech terbaru tentang AI dari HackerNews. REST API publik Algolia.' },
];

const MISSIONS = [
  {
    num:1, title:'JSONPlaceholder: Filter Query Param',
    desc:'Ambil semua posts milik userId=2 dari JSONPlaceholder menggunakan query parameter.',
    method:'GET', hasBody:false,
    startUrl:'https://jsonplaceholder.typicode.com/posts?userId=2',
    check:(d,s)=>{
      if(s!==200) return {ok:false,msg:`Status ${s} — harusnya 200`};
      if(!Array.isArray(d)) return {ok:false,msg:'Response harus array'};
      const bad=d.find(p=>p.userId!==2);
      if(bad) return {ok:false,msg:`Ada post dengan userId=${bad.userId} — filter belum benar`};
      return {ok:true,msg:`✓ Berhasil! ${d.length} posts dari JSONPlaceholder, semua userId=2.`};
    }
  },
  {
    num:2, title:'Open-Meteo: Cuaca Jakarta',
    desc:'GET suhu realtime Jakarta dari weather API gratis Open-Meteo.',
    method:'GET', hasBody:false,
    startUrl:'https://api.open-meteo.com/v1/forecast?latitude=-6.2&longitude=106.8&current=temperature_2m,weathercode',
    check:(d,s)=>{
      if(s!==200) return {ok:false,msg:`Status ${s} — harusnya 200`};
      if(!d.current) return {ok:false,msg:'Tidak ada field "current"'};
      if(d.current.temperature_2m===undefined) return {ok:false,msg:'Tidak ada temperature_2m'};
      return {ok:true,msg:`✓ Berhasil! Suhu Jakarta: ${d.current.temperature_2m}°C 🌡️ (API #2 dari 5)`};
    }
  },
  {
    num:3, title:'REST Countries: Info Indonesia',
    desc:'GET data Indonesia (ibu kota, populasi) dari REST Countries API.',
    method:'GET', hasBody:false,
    startUrl:'https://restcountries.com/v3.1/name/indonesia?fields=name,capital,population',
    check:(d,s)=>{
      if(s!==200) return {ok:false,msg:`Status ${s} — harusnya 200`};
      if(!Array.isArray(d)||d.length===0) return {ok:false,msg:'Response harus array berisi data'};
      const c=d[0];
      if(!c.capital) return {ok:false,msg:'Tidak ada field capital'};
      const cap=Array.isArray(c.capital)?c.capital[0]:c.capital;
      return {ok:true,msg:`✓ Berhasil! Ibu kota: ${cap}, Populasi: ${(c.population/1e6).toFixed(1)}M (API #3)`};
    }
  },
  {
    num:4, title:'Frankfurter: Kurs USD Hari Ini',
    desc:'GET kurs dollar AS ke berbagai mata uang dari Frankfurter API (data European Central Bank).',
    method:'GET', hasBody:false,
    startUrl:'https://api.frankfurter.app/latest?from=USD',
    check:(d,s)=>{
      if(s!==200) return {ok:false,msg:`Status ${s} — harusnya 200`};
      if(!d.rates) return {ok:false,msg:'Tidak ada field "rates"'};
      const n=Object.keys(d.rates).length;
      if(n<3) return {ok:false,msg:`Terlalu sedikit mata uang: ${n}`};
      const idr=d.rates.IDR?`1 USD = Rp ${Math.round(d.rates.IDR).toLocaleString()}`:`${n} mata uang tersedia`;
      return {ok:true,msg:`✓ Berhasil! Kurs USD hari ini: ${idr}. (API #4)`};
    }
  },
  {
    num:5, title:'JSONPlaceholder: POST Resource Baru',

    method:'POST', hasBody:true,
    startUrl:'https://jsonplaceholder.typicode.com/posts',

    check:(d,s)=>{
      if(s!==201) return {ok:false,msg:`Status ${s} — POST harusnya return 201 Created`};
      if(!d.id) return {ok:false,msg:'Tidak ada id di response'};
      if(!d.title) return {ok:false,msg:'Tidak ada title di response'};
      return {ok:true,msg:`✓ POST berhasil! Resource baru id=${d.id}. Semua 5 misi selesai! 🎉`};

];

// ─── STATE ───────────────────────────────────────────────────────────────────
let step=0, qAnsw={}, actMethod=-1, authTab=0, missionI=0, doneMissions=new Set();
let aiOpen=false, aiLoad=false, aiHist=[];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(json){
  if(typeof json!=='string') json=JSON.stringify(json,null,2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
    if(/^"/.test(m)){if(/:$/.test(m))return`<span class="hl-key">${esc(m)}</span>`;return`<span class="hl-str">${esc(m)}</span>`;}
    if(/true|false|null/.test(m))return`<span class="hl-kw">${m}</span>`;
    return`<span class="hl-num">${m}</span>`;
  });
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function updateNav(){
  document.getElementById('navRow').innerHTML=NAV.map((n,i)=>{
    const done=qAnsw[n.id]!==undefined||n.id==='realapi'||(n.id==='practice'&&doneMissions.size>0);
    const cls=['nav-btn',i===step?'active':'',done&&i!==step?'done':''].filter(Boolean).join(' ');
    return`<button class="${cls}" onclick="goStep(${i})"><span class="nb-id">${n.num}</span>${n.label}<span class="nb-tag">${n.tag}</span></button>`;
  }).join('');
  const pct=Math.round(((step+1)/STEPS.length)*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLabel').textContent=`${step+1} / ${STEPS.length}`;
}

function goStep(i){step=i;actMethod=-1;render();}

// ─── RENDERS ─────────────────────────────────────────────────────────────────
function render(){
  updateNav();
  const el=document.getElementById('main');
  const s=STEPS[step];
  const map={intro:rIntro,methods:rMethods,request:rRequest,response:rResponse,auth:rAuth,tools:rTools,realapi:rRealApi,practice:rPractice};
  el.innerHTML=(map[s]||rIntro)();
  window.scrollTo(0,0);
}

function rNavBtns(){
  return`<div class="nav-btns">
    ${step>0?`<button class="btn-prev" onclick="goStep(${step-1})">← ${NAV[step-1].label}</button>`:'<div></div>'}
    ${step<STEPS.length-1?`<button class="btn-next" onclick="goStep(${step+1})">→ ${NAV[step+1].label}</button>`:''}
  </div>`;
}

function rQuiz(id,q,ans){
  const dis=ans!==undefined?'disabled':'';
  const opts=q.opts.map((o,i)=>{
    let cls='quiz-opt';
    if(ans!==undefined){if(i===q.ans)cls+=' correct';else if(i===ans&&ans!==q.ans)cls+=' wrong';}
    return`<button class="${cls}" ${dis} onclick="answerQuiz('${id}',${i})">${o}</button>`;
  }).join('');
  const fb=ans!==undefined?`<div class="quiz-feedback ${ans===q.ans?'ok':'err'}">${ans===q.ans?q.fb_ok:q.fb_err}</div>`:'';
  return`<div class="quiz-box"><div class="quiz-label">▸ CEK PEMAHAMAN</div><div class="quiz-q">${q.q}</div><div class="quiz-opts">${opts}</div>${fb}</div>`;
}

// ─── STEP 01: INTRO ──────────────────────────────────────────────────────────
function rIntro(){

    <div class="flow" style="margin:20px 0">

    </div>
    <div class="code-block">

<span class="hl-punc">{</span>

<span class="hl-punc">}</span></div>

// ─── STEP 02: METHODS ────────────────────────────────────────────────────────
function rMethods(){

  const cards=methods.map((m,i)=>{
    const d=METHOD_DATA[m];
    return`<div class="method-card ${actMethod===i?'active':''}" onclick="selectMethod(${i})">

      <div class="mc-desc">${d.desc}</div>
    </div>`;
  }).join('');
  let detail='';
  if(actMethod>=0){
    const d=METHOD_DATA[methods[actMethod]];
    detail=`<div class="method-detail">
      <div class="md-title">▸ ${d.verb} — DETAIL</div>
      <div class="md-row"><span class="md-label">CRUD</span><span class="md-val">${d.crud}</span></div>
      <div class="md-row"><span class="md-label">Safe?</span><span class="md-val">${d.safe}</span></div>
      <div class="md-row"><span class="md-label">Idempotent?</span><span class="md-val">${d.idempotent}</span></div>
      <div class="md-row"><span class="md-label">Body?</span><span class="md-val">${d.body}</span></div>
      <div class="md-row"><span class="md-label">Returns</span><span class="md-val">${d.returns}</span></div>
      <div style="margin-top:10px"><div class="md-label" style="margin-bottom:6px">CONTOH:</div>

      </div>
    </div>`;
  }
  return`<div class="card">
    <div class="step-tag">▸ HTTP METHODS · CRUD</div>
    <h1 class="step-title">HTTP <span>Methods</span></h1>
    <p>HTTP Methods mendefinisikan <strong>operasi apa</strong> yang dilakukan pada resource. Keempat method utama memetakan langsung ke CRUD.</p>

      <span style="color:var(--muted);font-size:12px">CRUD ↔ HTTP Methods ↔ SQL</span><br><br>
      <span style="color:var(--green)">Create</span><span class="hl-punc"> → </span><strong style="color:var(--cyan)">POST</strong><span class="hl-punc"> → </span><span style="color:var(--muted)">INSERT</span>
      &nbsp;&nbsp;<span style="color:var(--cyan2)">Read</span><span class="hl-punc"> → </span><strong style="color:var(--green)">GET</strong><span class="hl-punc"> → </span><span style="color:var(--muted)">SELECT</span>

}

// ─── STEP 03: REQUEST ────────────────────────────────────────────────────────
function rRequest(){
  return`<div class="card">
    <div class="step-tag">▸ ANATOMY OF A REQUEST</div>
    <h1 class="step-title">Anatomy <span>Request</span></h1>
    <p>Setiap HTTP Request terdiri dari: <strong>URL</strong>, <strong>Headers</strong>, dan <strong>Body</strong>.</p>
    <div style="margin:14px 0 20px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:.08em">① URL — ALAMAT RESOURCE</div>
      <div class="url-anatomy">
        <div class="ua-line"><span class="ua-scheme">https://</span><span class="ua-host">api.example.com</span><span class="ua-path">/v1/posts/7</span><span class="ua-query">?userId=2&sort=desc</span></div>
        <div class="ua-parts">
          <span class="ua-part scheme">Scheme: https://</span>
          <span class="ua-part host">Host: api.example.com</span>
          <span class="ua-part path">Path: /v1/posts/7</span>
          <span class="ua-part query">Query: ?userId=2&sort=desc</span>
        </div>
      </div>
      <div class="info-grid" style="margin-top:10px">
        <div class="info-box"><div class="ib-label">PATH PARAMETER</div><div class="ib-val">Bagian dari path: <code>/posts/7</code> — identify resource spesifik</div></div>
        <div class="info-box"><div class="ib-label">QUERY PARAMETER</div><div class="ib-val">Setelah <code>?</code> — untuk filter, sort, pagination</div></div>
      </div>
    </div>
    <div style="margin:20px 0">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:.08em">② HEADERS — METADATA</div>
      <div class="code-block"><div class="cb-header"><span class="cb-dot r"></span><span class="cb-dot y"></span><span class="cb-dot g"></span>HTTP Request Headers</div>
<span class="hl-key">Content-Type</span><span class="hl-punc">:</span>  <span class="hl-str">application/json</span>         <span class="hl-comment"># Format data yang dikirim</span>
<span class="hl-key">Accept</span><span class="hl-punc">:</span>         <span class="hl-str">application/json</span>         <span class="hl-comment"># Format yang diinginkan</span>
<span class="hl-key">Authorization</span><span class="hl-punc">:</span>  <span class="hl-str">Bearer eyJhbGciOiJIUzI1...</span>  <span class="hl-comment"># Token auth</span>
<span class="hl-key">X-API-Key</span><span class="hl-punc">:</span>      <span class="hl-str">sk-abc123def456</span>           <span class="hl-comment"># API Key</span></div>

// ─── STEP 04: RESPONSE ───────────────────────────────────────────────────────
function rResponse(){
  const statuses=[
    {code:'200',name:'OK',desc:'Request berhasil',cls:'s2'},
    {code:'201',name:'Created',desc:'Resource dibuat (POST)',cls:'s2'},
    {code:'204',name:'No Content',desc:'Berhasil, no data (DELETE)',cls:'s2'},
    {code:'301',name:'Moved Permanently',desc:'URL resource berubah',cls:'s3'},
    {code:'400',name:'Bad Request',desc:'Request tidak valid',cls:'s4'},
    {code:'401',name:'Unauthorized',desc:'Perlu auth / token invalid',cls:'s4'},
    {code:'403',name:'Forbidden',desc:'Auth ok tapi no akses',cls:'s4'},
    {code:'404',name:'Not Found',desc:'Resource tidak ditemukan',cls:'s4'},
    {code:'429',name:'Too Many Requests',desc:'Rate limit terlampaui',cls:'s4'},
    {code:'500',name:'Internal Server Error',desc:'Error di sisi server',cls:'s5'},
    {code:'502',name:'Bad Gateway',desc:'Upstream server error',cls:'s5'},
    {code:'503',name:'Service Unavailable',desc:'Server down/overload',cls:'s5'},
  ];
  return`<div class="card">
    <div class="step-tag">▸ RESPONSE & STATUS CODES</div>
    <h1 class="step-title">HTTP <span>Response</span></h1>
    <p>Setiap response: <strong>Status Code</strong> (3 digit), <strong>Headers</strong>, dan <strong>Body</strong>.</p>
    <div class="diagram"><span style="font-size:12px;color:var(--muted)">Pattern:</span><br><br>
      <span class="s2">2xx</span> → Sukses &nbsp;&nbsp;<span class="s3">3xx</span> → Redirect &nbsp;&nbsp;<span class="s4">4xx</span> → Error Client &nbsp;&nbsp;<span class="s5">5xx</span> → Error Server
    </div>
    <div class="status-grid">${statuses.map(s=>`<div class="status-pill"><span class="status-code ${s.cls}">${s.code}</span><div class="sp-text"><div class="sp-name">${s.name}</div>${s.desc}</div></div>`).join('')}</div>
    <p>💡 <strong>Di n8n:</strong> Pakai node IF untuk cek status ≥ 400 sebagai trigger error handling.</p>
    ${rQuiz('response',QZ.response,qAnsw.response)}
  </div>${rNavBtns()}`;
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function selectMethod(i){actMethod=actMethod===i?-1:i;render();}
function setAuthTab(i){authTab=i;render();}
function answerQuiz(id,opt){if(qAnsw[id]!==undefined)return;qAnsw[id]=opt;render();}
function selectMission(i){missionI=i;render();}

async function runApi(idx){
  const btn=document.getElementById('tryBtn'+idx);
  const div=document.getElementById('lr'+idx);
  if(!btn||!div)return;
  btn.disabled=true;btn.innerHTML='<span>⏳</span> Loading...';
  div.innerHTML='<span style="color:var(--muted)">Fetching...</span>';div.classList.add('show');
  try{
    const res=await fetch(LIVE_APIS[idx].url);
    const data=await res.json();
    div.innerHTML=hl(data);
  }catch(e){div.innerHTML=`<span style="color:var(--red)">Error: ${esc(e.message)}</span>`;}
  btn.disabled=false;btn.innerHTML='<span>▶</span> COBA LAGI';
}

async function sendMission(){
  const m=MISSIONS[missionI];
  const urlEl=document.getElementById('mUrl');
  const btn=document.getElementById('sendBtn');
  const res=document.getElementById('mResult');
  if(!urlEl||!btn||!res)return;
  btn.disabled=true;btn.textContent='⏳ Sending...';
  res.className='mission-result show';res.innerHTML='<span style="color:var(--muted)">Calling API...</span>';
  const opts={method:m.method,headers:{'Content-Type':'application/json'}};
  if(m.hasBody){const b=document.getElementById('mBody');if(b)opts.body=b.value;}
  try{
    const r=await fetch(urlEl.value.trim(),opts);
    const status=r.status;
    let data;try{data=await r.json();}catch(e){data={};}
    const check=m.check(data,status);
    res.innerHTML=`<div style="margin-bottom:10px;font-size:11px;color:var(--muted)">STATUS: <span style="color:${status<400?'var(--green)':'var(--red)'}">${status}</span></div>
      <div style="margin-bottom:10px;font-size:13px;color:${check.ok?'var(--green)':'var(--red)'}"><strong>${check.msg}</strong></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">RESPONSE:</div>${hl(data)}`;
    res.className='mission-result show '+(check.ok?'ok':'err');
    if(check.ok){
      doneMissions.add(missionI);
      const tabs2=document.querySelectorAll('.mission-tab');
      if(tabs2[missionI])tabs2[missionI].classList.add('done');
      if(doneMissions.size>=5)setTimeout(render,2000);
    }
  }catch(e){
    res.innerHTML=`<span style="color:var(--red)">Fetch error: ${esc(e.message)}</span>`;
    res.className='mission-result show err';
  }
  btn.disabled=false;btn.textContent='▶ SEND REQUEST';
}

async function sendAI(){
  const inp=document.getElementById('aiInput');

  aiLoad=true;document.getElementById('aiSend').disabled=true;
  renderHistory();
  const messages=aiHist.slice(-8).map(h=>({role:h.role==='user'?'user':'assistant',content:h.content}));
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`Kamu adalah AI Tutor untuk REST API Fundamentals (Sesi 2) di AI Automation Bootcamp. Bantu peserta memahami REST API untuk dipakai di n8n dan automation workflow.

Topik yang bisa ditanya: HTTP methods, URL anatomy, headers/body, status codes, authentication (API Key & Bearer), cara pakai Postman & Thunder Client, dan cara hit API dari n8n Code Node atau HTTP Request node.

Jawab Bahasa Indonesia, ramah dan praktis. Max 3 paragraf pendek. Gunakan contoh konkret relevan dengan automation. Jika ada kode, gunakan backtick. Jangan terlalu teoritis — fokus "bagaimana cara pakainya di n8n atau Postman."`,
        messages
      })
    });
    const data=await res.json();
    const reply=data.content&&data.content[0]?data.content[0].text:'Maaf, tidak dapat merespons saat ini.';
    aiHist.push({role:'bot',content:reply});
  }catch(e){aiHist.push({role:'bot',content:`Error: ${e.message}`});}
  aiLoad=false;document.getElementById('aiSend').disabled=false;
  renderHistory();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
